{% extends 'base.html' %}
{% block title %}Edit Skill - Placement Tracker{% endblock %}
{% block content %}
<h3 class="mb-4"><i class="fa-solid fa-pen me-2 text-primary"></i>Edit Skill</h3>
<div class="row">
    <div class="col-lg-6">
        <div class="pt-card">
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Skill Name</label>
                    {{ form.name }}
                </div>
                <div class="mb-3">
                    <label class="form-label">Category</label>
                    {{ form.category }}
                </div>
                <div class="mb-3">
                    <label class="form-label">Proficiency</label>
                    {{ form.proficiency }}
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="fa-solid fa-floppy-disk me-1"></i>Save Changes
                </button>
                <a href="{% url 'skills' %}" class="btn btn-outline-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
