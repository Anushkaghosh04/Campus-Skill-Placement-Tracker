{% extends 'base.html' %}
{% block title %}Delete Skill - Placement Tracker{% endblock %}
{% block content %}
<h3 class="mb-4"><i class="fa-solid fa-trash me-2 text-danger"></i>Delete Skill</h3>
<div class="row">
    <div class="col-lg-6">
        <div class="pt-card">
            <p>Are you sure you want to delete the skill <strong>{{ skill.name }}</strong>?</p>
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">
                    <i class="fa-solid fa-trash me-1"></i>Yes, Delete
                </button>
                <a href="{% url 'skills' %}" class="btn btn-outline-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
